version: 2.1
orbs:
  lucos: lucos/deploy@0

workflows:
  version: 2
  build-deploy:
    jobs:
      - lucos/build-amd64:
          serial-group: << pipeline.project.slug >>/build
      - lucos/deploy-avalon:
          serial-group: << pipeline.project.slug >>/deploy-avalon
          requires:
            - lucos/build-amd64
          filters:
            branches:
              only:
                - main